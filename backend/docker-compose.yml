version: '3.8'

services:
  api:
    build: .
    container_name: gen-audius-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: gen-audius-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ../frontend/dist:/app/frontend_dist
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    container_name: gen-audius-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email genaudius@gmail.com --agree-tos --no-eff-email -d genaudius.com -d www.genaudius.com -d studio.genaudius.com

  mongodb:
    image: mongo:latest
    container_name: gen-audius-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: gen-audius-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
  certbot-etc:
  certbot-var:
  certbot-www:

